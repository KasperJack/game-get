# packages/ion-fury/entities/release_off_140/entity.toml
id = "release_off_140"
source = "official"
source_type = "official"  # Different from "repacker" or "scene_rip"

# Version info - CLEAN and SEMANTIC
version_label = "1.4.0"
version_semantic = "1.4.0"  # Valid semver!
game_version = "1.4.0"

# What's included
[content]
size_gb = 2.5
size_compressed_gb = 1.8
languages = ["en", "fr", "de", "es", "ru"]
dlcs = []  # No DLCs, base game
is_repack = false
is_open_source = true

# Quality indicators
[quality]
install_time_minutes = 2
trust_rating = 5.0  # Official source, fully trusted
verified_signature = true

# Relationships - CRITICAL for open source
[relationships]
# This is the SAME game as GitHub release!
equivalent_to = ["release_gh_140"]  # Same content, different source

# This is a newer version than 1.3.0
supersedes = ["release_off_130"]

# Based on official version
based_on_game_version = "1.4.0"

# Open source specific
[open_source]
license = "GPL-3.0"
source_code_url = "https://github.com/ionfury/ionfury"
build_from_source = false  # Pre-compiled binary